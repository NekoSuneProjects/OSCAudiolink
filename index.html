<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>OSCAudiolink by NekoSuneVR</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
        body { background-color: #121212; color: #ffffff; }
        .tab { display: none; }
        .tab.active { display: block; }
        #audioCanvas { width: 100%; height: 300px; }
        </style>
    </head>
    <body class="container py-3">
        <h1 class="text-center mb-4">OSCAudiolink by NekoSuneVR</h1>
        <div class="d-flex justify-content-center mb-3">
            <button class="btn btn-outline-light mx-1" onclick="openTab('waveform')">Audio Wave</button>
            <button class="btn btn-outline-light mx-1" onclick="openTab('settings')">Settings</button>
            <button class="btn btn-outline-light mx-1" onclick="openTab('connect')">Connect</button>
        </div>
        <div id="waveform" class="tab active text-center">
            <canvas id="audioCanvas"></canvas>
            <div class="d-flex justify-content-between text-center mt-2">
                <span>Bass</span>
                <span>Low</span>
                <span>Mid</span>
                <span>Treble</span>
            </div>
        </div>
        <div id="settings" class="tab">
            <div class="mb-3">
                <label for="audioDeviceSelect" class="form-label">Select Audio Device:</label>
                <select id="audioDeviceSelect" class="form-select bg-dark text-light">
                    <option value="">Loading devices...</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="portInput" class="form-label">OSC Port:</label>
                <input
                    type="number"
                    id="portInput"
                    class="form-control bg-dark text-light"
                    placeholder="Enter Port (e.g., 9000)"
                >
            </div>
            <!-- Gain controls for each frequency band -->
            <div class="mb-3">
                <label for="bassGain" class="form-label">Bass Gain:</label>
                <input
                    type="range"
                    id="bassGain"
                    class="form-range"
                    min="1"
                    max="5"
                    step="0.1"
                    value="2.5"
                >
            </div>
            <div class="mb-3">
                <label for="lowGain" class="form-label">Low Gain</label>
                <input
                    type="range"
                    id="lowGain"
                    class="form-range"
                    min="1"
                    max="3"
                    step="0.1"
                    value="1"
                >
            </div>
            <div class="mb-3">
                <label for="midGain" class="form-label">Mid Gain</label>
                <input
                    type="range"
                    id="midGain"
                    class="form-range"
                    min="1"
                    max="3"
                    step="0.1"
                    value="1"
                >
            </div>
            <div class="mb-3">
                <label for="trebleGain" class="form-label">Treble Gain</label>
                <input
                    type="range"
                    id="trebleGain"
                    class="form-range"
                    min="1"
                    max="3"
                    step="0.1"
                    value="1"
                >
            </div>
            <button id="toggleAudio" class="btn btn-success">Start Audio</button>
        </div>
        <!-- Connect tab for Spotify integration -->
        <div id="connect" class="tab">
            <h3>Spotify Integration</h3>
            <button id="linkSpotify" class="btn btn-success">Link Spotify</button>
            <div id="trackInfo" class="mt-3"></div>
            <div class="form-check form-switch mt-3">
                <input
                    class="form-check-input"
                    type="checkbox"
                    id="liveTrackToggle"
                    checked
                >
                <label class="form-check-label" for="liveTrackToggle">Enable Live Track Updates</label>
            </div>
        </div>
        <script src="renderer.js"></script>
        <script>
        function openTab(tabId) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        document.getElementById('linkSpotify').addEventListener('click', () => {
        window.open('http://yourserver.com/authorize', '_blank'); // Open the authorization link
    });

    // Listen for the tokens from your server (use IPC or another method for receiving tokens)
    window.electronAPI.receiveTokens((event, tokens) => {
        localStorage.setItem('spotify_access_token', tokens.accessToken);
        localStorage.setItem('spotify_refresh_token', tokens.refreshToken);
    });

        // Display track info
        window.electronAPI.updateTrackInfo((event, trackInfo) => {
            document.getElementById('trackInfo').innerText = trackInfo
                ? `Now Playing: ${trackInfo.artist} - ${trackInfo.title}`
                : 'No track currently playing';
        });
        </script>
    </body>
</html>
