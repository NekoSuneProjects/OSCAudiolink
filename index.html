<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSCAudiolink by NekoSuneVR</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    // Tailwind configuration
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            neon: "#00ffff",
            accent: "#ff007f",
            pinky: "#b30059",
            greeny: "#00994d",
          },
        },
      },
    };
  </script>

  <style>
    .tab {
      display: none;
    }

    .tab.active {
      display: block;
    }

    #audioCanvas {
      width: 100%;
      height: 300px;
    }

    /* Rainbow animated gradient used for both borders and text */
    @keyframes rainbowShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* 🌈 Rainbow border for buttons */
    .rainbow-border {
      position: relative;
      border-radius: 0.5rem;
      /* rounded-lg match */
      overflow: hidden;
      isolation: isolate;
    }

    .rainbow-border::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 2px;
      /* border thickness */
      border-radius: inherit;
      background: linear-gradient(270deg, #ff0080, #ff8c00, #40e0d0, #00ff80, #9932cc);
      background-size: 500% 500%;
      animation: rainbowShift 6s linear infinite;
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* 🌈 Rainbow text animation */
    .rainbow-text {
      background: linear-gradient(270deg, #ff0080, #ff8c00, #40e0d0, #00ff80, #9932cc);
      background-size: 500% 500%;
      animation: rainbowShift 6s linear infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Subtle glow for pink and green themes */
    .pink-glow {
      text-shadow: 0 0 10px #ff4da6, 0 0 20px #ff80c0;
    }

    .green-glow {
      text-shadow: 0 0 10px #00ff80, 0 0 20px #00ffaa;
    }
  </style>
</head>

<body class="min-h-screen bg-gray-900 text-gray-100 transition-colors duration-300 p-4">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-6">
      OSCAudiolink by <span class="text-accent">NekoSuneVR</span>
    </h1>

    <!-- Theme selector -->
    <div class="flex justify-end mb-4">
      <label for="themeSelect" class="mr-2">Theme:</label>
      <select id="themeSelect" class="bg-gray-800 text-gray-100 rounded-md px-2 py-1">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="neon">Neon</option>
        <option value="rainbow">Rainbow</option>
        <option value="pink">Pink</option>
        <option value="green">Green</option>
      </select>
    </div>

    <!-- Tabs -->
    <div class="flex justify-center space-x-2 mb-6">
      <button class="tab-btn px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700" onclick="openTab('waveform')">
        Audio Wave
      </button>
      <button class="tab-btn px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700" onclick="openTab('settings')">
        Settings
      </button>
      <button class="tab-btn px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700" onclick="openTab('oscLog')">
        OSC Log
      </button>
    </div>

    <!-- Waveform -->
    <div id="waveform" class="tab active text-center bg-gray-800 border border-gray-600 rounded-xl p-4 shadow-md">
      <canvas id="audioCanvas" class="w-full h-64 rounded-lg bg-gray-900"></canvas>
      <div class="flex justify-between text-sm mt-3 text-gray-400">
        <span>Low</span>
        <span>Bass</span>
        <span>Mid</span>
        <span>Treble</span>
      </div>
    </div>


    <!-- Settings -->
    <div id="settings" class="tab space-y-4 bg-gray-700 border border-gray-600 rounded-xl p-4 shadow-md text-white">
      <div>
        <label for="audioDeviceSelect" class="block mb-1 font-semibold">Select Audio Device</label>
        <select id="audioDeviceSelect" class="bg-gray-600 text-white rounded-md px-3 py-2 w-full">
          <option value="">Loading devices...</option>
        </select>
      </div>

      <div>
        <label for="portInput" class="block mb-1 font-semibold">OSC Send Port</label>
        <input type="number" id="portInput" class="bg-gray-600 text-white rounded-md px-3 py-2 w-full"
          placeholder="Enter Port (e.g., 9000)" />
      </div>

      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <div>
          <label for="receiverPortInput" class="block mb-1 font-semibold">VRChat Receive Port</label>
          <input type="number" id="receiverPortInput" class="bg-gray-600 text-white rounded-md px-3 py-2 w-full"
            placeholder="Enter Port (e.g., 9001)" />
        </div>
        <div class="flex items-end">
          <label class="flex items-center w-full bg-gray-800 rounded-md px-3 py-2">
            <input type="checkbox" id="enableReceive" class="mr-2" />
            Enable VRChat OSC Receive
          </label>
        </div>
      </div>

      <!-- Gains -->
      <div>
        <label class="block font-semibold mb-1">Gain: <span id="gainValue">2.0</span></label>
        <input type="range" id="gainSlider" class="w-full accent-accent" min="0.1" max="10" step="0.1" value="2.0" />
      </div>

      <div>
        <label class="block font-semibold mb-1">Low Boost (20-120 Hz): <span id="lowBoostValue">2.6</span></label>
        <input type="range" id="lowBoostSlider" class="w-full accent-accent" min="0.1" max="10" step="0.1" value="2.6" />
      </div>

      <div>
        <label class="block font-semibold mb-1">Bass Boost (120-250 Hz): <span id="bassBoostValue">3.0</span></label>
        <input type="range" id="bassBoostSlider" class="w-full accent-accent" min="0.1" max="10" step="0.1" value="3.0" />
      </div>

      <div>
        <label class="block font-semibold mb-1">Mid Boost (250-4000 Hz): <span id="midBoostValue">2.0</span></label>
        <input type="range" id="midBoostSlider" class="w-full accent-accent" min="0.1" max="10" step="0.1" value="2.0" />
      </div>

      <div>
        <label class="block font-semibold mb-1">Treble Boost (4000-20000 Hz): <span id="trebleBoostValue">3.4</span></label>
        <input type="range" id="trebleBoostSlider" class="w-full accent-accent" min="0.1" max="10" step="0.1" value="3.4" />
      </div>

      <button id="toggleAudio"
        class="tab-btn w-full py-2 rounded-lg bg-green-600 hover:bg-green-700 transition text-white">
        Start Audio
      </button>
    </div>

    <!-- OSC Log -->
    <div id="oscLog" class="tab space-y-4 bg-gray-700 border border-gray-600 rounded-xl p-4 shadow-md text-white">
      <h3 class="text-xl font-semibold mb-2">OSC Messages & Graph</h3>
      <canvas id="oscGraph" class="w-full h-64 rounded-lg bg-gray-900 mb-4"></canvas>
      <textarea id="oscLogText" class="w-full h-32 bg-gray-600 text-white rounded-md p-2" readonly></textarea>
      <button id="clearLog" class="tab-btn bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md">
        Clear Log
      </button>
    </div>

  </div>

  <script src="renderer.js"></script>
  <script>
    // --- Tab switching ---
    function openTab(tabId) {
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));
      document.getElementById(tabId).classList.add("active");
    }

    // --- THEME HANDLING ---
    const themeSelect = document.getElementById("themeSelect");
    const savedTheme = localStorage.getItem("theme") || "dark";
    applyTheme(savedTheme);
    themeSelect.value = savedTheme;

    themeSelect.addEventListener("change", (e) => {
      const theme = e.target.value;
      applyTheme(theme);
      localStorage.setItem("theme", theme);
    });

    function applyTheme(theme) {
      // Reset
      document.documentElement.classList.remove("dark");
      document.body.className =
        "min-h-screen transition-colors duration-300 p-4 text-gray-100";

      switch (theme) {
        case "light":
          document.body.className = "min-h-screen transition-colors duration-300 p-4 bg-gray-100 text-gray-900";
          resetTabs(); // remove any rainbow or previous theme styles

          // Update tab buttons for light theme
          document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.style.color = "#f9fafb";       // light text color
            btn.style.backgroundColor = "#4b5563"; // keep dark button bg for contrast
          });
          break;

        case "dark":
          document.documentElement.classList.add("dark");
          document.body.className = "min-h-screen transition-colors duration-300 p-4 bg-gray-900 text-gray-100";
          resetTabs();
          break;

        case "neon":
          document.body.className = "min-h-screen transition-colors duration-300 p-4 bg-black text-neon";
          resetTabs();
          break;

        case "rainbow":
          document.body.className = "min-h-screen transition-colors duration-300 p-4 bg-black text-white";
          document.querySelectorAll(".tab").forEach(tab => tab.classList.add("rainbow-border"));
          document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.classList.add("rainbow-border", "rainbow-text");
            btn.style.backgroundColor = ""; // reset in case previous theme set it
            btn.style.color = "";
          });
          break;

        case "pink":
          document.body.className = "min-h-screen transition-colors duration-300 p-4 bg-black text-white";
          resetTabs();
          document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.style.backgroundColor = "#9b005f"; // darker pink
            btn.style.color = "#fff";
          });
          break;

        case "green":
          document.body.className = "min-h-screen transition-colors duration-300 p-4 bg-black text-white";
          resetTabs();
          document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.style.backgroundColor = "#007a3a"; // darker green
            btn.style.color = "#fff";
          });
          break;

        default:
          document.body.className = "min-h-screen transition-colors duration-300 p-4 bg-gray-900 text-gray-100";
          resetTabs();
      }
    }

    function resetTabs() {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("rainbow-border"));
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.remove("rainbow-border", "rainbow-text");
        btn.style.backgroundColor = ""; // reset any inline background
        btn.style.color = ""; // reset inline color
      });
    }

    // Theme persistence is handled in localStorage; app settings are stored in Electron Store.
  </script>
</body>

</html>
  </script>
</body>

</html>
