name: Windows Build & Release

permissions:
  contents: write

on:
  push:
    branches:
      - RELEASE
      - BETA

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (fix node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Configure node-gyp Python
        shell: pwsh
        run: |
          npm config set python python3.10

      - name: Clean Install
        shell: pwsh
        run: |
          npm cache clean --force
          if (Test-Path node_modules) { Remove-Item node_modules -Recurse -Force }
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
          npm install

      # ✅ ALWAYS pull 1.0.0 from package.json
      - name: Get Base Version from package.json
        shell: pwsh
        run: |
          $base = (node -p "require('./package.json').version")
          Write-Host "Base version from package.json: $base"
          Add-Content -Path $env:GITHUB_ENV -Value "BASE_VERSION=$base"

      - name: Determine Channel + Final Version
        shell: pwsh
        run: |
          $branch = "${{ github.ref_name }}"
          $base = "${{ env.BASE_VERSION }}"

          if ($branch -eq "BETA") {
            $channel = "beta"
            $version = "$base-beta-${{ github.run_number }}"
            $prerelease = "true"
          }
          else {
            $channel = "release"
            $version = $base
            $prerelease = "false"
          }

          Write-Host "Branch: $branch"
          Write-Host "Channel: $channel"
          Write-Host "Version: $version"

          Add-Content -Path $env:GITHUB_ENV -Value "CHANNEL=$channel"
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$version"
          Add-Content -Path $env:GITHUB_ENV -Value "TAG=$version"
          Add-Content -Path $env:GITHUB_ENV -Value "PRERELEASE=$prerelease"

      - name: Build Electron App
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Release Notes
        id: notes
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: ${{ env.VERSION }}
          name: "OSCAudioLink ${{ env.VERSION }}"
          tag: ${{ env.TAG }}
          prerelease: ${{ env.PRERELEASE == 'true' }}

      - name: Save Release Notes
        shell: pwsh
        run: |
          Set-Content -Path release_notes.txt -Value "${{ steps.notes.outputs.body }}"

      - name: Create GitHub Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: OSCAudioLink ${{ env.VERSION }}
          prerelease: ${{ env.PRERELEASE == 'true' }}
          body: |
            ${{ steps.notes.outputs.body }}

            **EXE Installer**
            https://github.com/NekoSuneProjects/OSCAudiolink/releases/download/${{ env.TAG }}/OSCAudioLink-Setup-${{ env.BASE_VERSION }}.exe

            **MSI Installer**
            https://github.com/NekoSuneProjects/OSCAudiolink/releases/download/${{ env.TAG }}/OSCAudioLink-Setup-${{ env.BASE_VERSION }}.msi
          files: |
            dist/OSCAudioLink-Setup-${{ env.BASE_VERSION }}.exe
            dist/OSCAudioLink-Setup-${{ env.BASE_VERSION }}.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord Notification
        shell: pwsh
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          $notes = Get-Content release_notes.txt -Raw

          $exeUrl = "https://github.com/NekoSuneProjects/OSCAudiolink/releases/download/${{ env.TAG }}/OSCAudioLink-Setup-${{ env.BASE_VERSION }}.exe"
          $msiUrl = "https://github.com/NekoSuneProjects/OSCAudiolink/releases/download/${{ env.TAG }}/OSCAudioLink-Setup-${{ env.BASE_VERSION }}.msi"

          $downloadBlock = "**EXE Installer**`n$exeUrl`n`n**MSI Installer**`n$msiUrl"

          $json = @{
            username = "OSCAudioLink Bot"
            content = "<@&1384262560395559122> **UPDATE ($($env:CHANNEL.ToUpper()))**"
            embeds = @(
              @{
                title = "OSCAudioLink $env:VERSION"
                description = "$notes`n`n$downloadBlock"
                color = if ($env:CHANNEL -eq "beta") { 16750848 } else { 16776960 }
                timestamp = (Get-Date).ToString("o")
              }
            )
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK -Method Post -ContentType 'application/json' -Body $json
